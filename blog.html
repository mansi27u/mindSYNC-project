<h1>How to Stay Productive During Exams</h1>

<p>Struggling with procrastination? You're not alone.</p>

<h2>1. Use Focus Sessions</h2>
<p>Study in short bursts (Pomodoro technique)</p>

<h2>2. Track Your Mood</h2>
<p>Your emotions affect productivity more than you think.</p>

<h2>3. Avoid Distractions</h2>
<p>Turn off notifications while studying.</p>
