<body>

<header>
    <h2>How are you feeling today?</h2>

    <select id="mood">
        <option>😐 Normal</option>
        <option>😴 Tired</option>
        <option>😰 Stressed</option>
    </select>

<button onclick="recommend()">Get Suggestion</button>

<p id="result"></p>

<script>
function recommend() {
    let mood = document.getElementById("mood").value;
    let result = document.getElementById("result");

    if (mood.includes("Tired")) {
        result.innerText = "Take a short break ☕";
    } else if (mood.includes("Stressed")) {
        result.innerText = "Try breathing exercise 🧘";
    } else {
        result.innerText = "Start a 25 min focus session 🎯";
    }
}
</script>
    <h1>MindSync</h1>
    <p>Focus better. Feel better.</p>
    <button>Download App</button>
</header>
